name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Vulkan build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends glslc libvulkan-dev
      - name: Download model
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import hf_hub_download; import os; os.makedirs('model', exist_ok=True); hf_hub_download(repo_id='lucaelin/qwen3-0.6b-cn-gguf', filename='Qwen3-0.6B-grpo-ckpt700-q8_0.gguf', local_dir='model')"
      - name: Build plugin package
        run: |
          chmod +x pack.sh
          ./pack.sh
      - name: Rename artifact
        run: |
          sanitized_tag="${GITHUB_REF_NAME//./-}"
          mv dist/cn-plugin-qwen3-llamacpp.zip dist/cn-plugin-qwen3-llamacpp-${sanitized_tag}-linux.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Vulkan SDK
        run: |
          choco install vulkan-sdk -y
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw "Vulkan SDK install directory not found" }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh
      - name: Download model
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import hf_hub_download; import os; os.makedirs('model', exist_ok=True); hf_hub_download(repo_id='lucaelin/qwen3-0.6b-cn-gguf', filename='Qwen3-0.6B-grpo-ckpt700-q8_0.gguf', local_dir='model')"
        shell: pwsh
      - name: Build plugin package
        run: ./pack.ps1
        shell: pwsh
      - name: Rename artifact
        run: |
          $sanitizedTag = $env:GITHUB_REF_NAME -replace '\.', '-'
          Rename-Item -Path "dist\cn-plugin-qwen3-llamacpp.zip" -NewName "cn-plugin-qwen3-llamacpp-$sanitizedTag-windows.zip"
        shell: pwsh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
